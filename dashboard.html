<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — QR Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:    #E53E3E;
      --gold:   #D4A017;
      --green:  #22C55E;
      --dark:   #0D0D0D;
      --card:   #161616;
      --border: #2A2A2A;
      --muted:  #6B6B6B;
      --light:  #F0F0F0;
      --white:  #FFFFFF;
    }
    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: var(--dark); color: var(--light);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 18px 32px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, rgba(229,62,62,.05) 0%, transparent 60%);
    }
    .logo-icon {
      width: 38px; height: 38px; background: var(--red);
      border-radius: 10px; display: grid; place-items: center; font-size: 18px;
    }
    .logo-text { font-size: 18px; font-weight: 800; }
    .logo-text span { color: var(--red); }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .btn-refresh {
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 14px; color: var(--muted);
      font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px;
    }
    .btn-refresh:hover { border-color: var(--green); color: var(--green); }
    .btn-back {
      background: transparent; border: 1px solid #3a1a1a;
      border-radius: 8px; padding: 6px 14px; color: var(--muted);
      font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .2s; text-decoration: none;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-back:hover { border-color: var(--red); color: var(--red); }

    /* ── MAIN ── */
    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px 60px; }

    /* ── STATS CARDS ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 28px;
    }
    @media(max-width:640px){ .stats-grid { grid-template-columns: 1fr; } }

    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 22px;
      display: flex; align-items: center; gap: 16px;
    }
    .stat-icon {
      width: 46px; height: 46px; border-radius: 12px;
      display: grid; place-items: center; font-size: 20px; flex-shrink: 0;
    }
    .stat-icon.red   { background: rgba(229,62,62,.12); }
    .stat-icon.gold  { background: rgba(212,160,23,.12); }
    .stat-icon.green { background: rgba(34,197,94,.12); }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 4px; }
    .stat-value { font-size: 26px; font-weight: 800; color: var(--white); }
    .stat-value.red   { color: var(--red); }
    .stat-value.gold  { color: var(--gold); }
    .stat-value.green { color: var(--green); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .toolbar h2 { font-size: 16px; font-weight: 800; flex: 1; }
    .search-input {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px; color: var(--white);
      font-family: inherit; font-size: 13px; outline: none;
      transition: border-color .2s; width: 220px;
    }
    .search-input:focus { border-color: var(--red); }
    .search-input::placeholder { color: #444; }

    .filter-select {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; color: var(--light);
      font-family: inherit; font-size: 13px; outline: none; cursor: pointer;
    }
    .filter-select option { background: #1a1a1a; }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 12px 16px; text-align: left;
      font-size: 10px; font-weight: 700; letter-spacing: .7px;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid #1e1e1e;
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1a1a1a; }
    tbody td {
      padding: 13px 16px; font-size: 13px; color: var(--light);
      vertical-align: middle;
    }

    .bank-badge {
      display: inline-flex; align-items: center;
      background: rgba(229,62,62,.1); border: 1px solid rgba(229,62,62,.2);
      border-radius: 6px; padding: 3px 8px;
      font-size: 11px; font-weight: 700; color: var(--red);
    }
    .amount-text { font-weight: 700; color: var(--gold); }
    .content-text { color: var(--muted); font-size: 12px; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .time-text { color: var(--muted); font-size: 11px; white-space: nowrap; }

    /* ── EMPTY / LOADING ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 14px;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }

    .loading-row td {
      text-align: center; padding: 50px;
      color: var(--muted); font-size: 13px;
    }
    .spinner-inline {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid #333; border-top-color: var(--red);
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PAGINATION ── */
    .pagination {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 6px; margin-top: 16px;
    }
    .page-btn {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 7px; padding: 6px 12px; color: var(--muted);
      font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
    .page-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
    .page-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1e1e1e; border: 1px solid var(--green);
      border-radius: 10px; padding: 12px 18px;
      font-size: 13px; color: var(--green);
      display: none; align-items: center; gap: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      animation: slideUp .3s ease;
      z-index: 999;
    }
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    @media(max-width:768px){
      thead th:nth-child(4), tbody td:nth-child(4),
      thead th:nth-child(5), tbody td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">📊</div>
  <div>
    <div class="logo-text"><span>QR</span> Dashboard</div>
  </div>
  <div class="header-right">
    <button class="btn-refresh" onclick="loadData()">⟳ Làm mới</button>
    <a class="btn-back" href="index.html">← Về trang QR</a>
  </div>
</header>

<main>
  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon red">🔢</div>
      <div>
        <div class="stat-label">Tổng QR đã tạo</div>
        <div class="stat-value red" id="statTotal">—</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon gold">💰</div>
      <div>
        <div class="stat-label">Tổng số tiền</div>
        <div class="stat-value gold" id="statAmount">—</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">🏦</div>
      <div>
        <div class="stat-label">Ngân hàng phổ biến nhất</div>
        <div class="stat-value green" id="statTopBank">—</div>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="toolbar">
    <h2>📋 Lịch sử tạo QR</h2>
    <input class="search-input" type="text" id="searchInput"
      placeholder="🔍 Tìm kiếm..." oninput="applyFilter()"/>
    <select class="filter-select" id="bankFilter" onchange="applyFilter()">
      <option value="">Tất cả ngân hàng</option>
    </select>
    <select class="filter-select" id="sortSelect" onchange="applyFilter()">
      <option value="newest">Mới nhất</option>
      <option value="oldest">Cũ nhất</option>
      <option value="amount_desc">Số tiền cao nhất</option>
      <option value="amount_asc">Số tiền thấp nhất</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Ngân hàng</th>
          <th>Số tài khoản</th>
          <th>Chủ tài khoản</th>
          <th>Số tiền</th>
          <th>Nội dung</th>
          <th>Thời gian</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="loading-row">
          <td colspan="7">
            <span class="spinner-inline"></span> Đang tải dữ liệu...
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>
</main>

<div class="toast" id="toast">✅ Đã làm mới dữ liệu</div>

<script type="module">
  import { initializeApp }           from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const firebaseConfig = {
    apiKey           : "AIzaSyAjpcbDGsbZpLCewWGzLdGKyCUHrGDOr5Y",
    authDomain       : "qr-generator-cba8f.firebaseapp.com",
    databaseURL      : "https://qr-generator-cba8f-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId        : "qr-generator-cba8f",
    storageBucket    : "qr-generator-cba8f.firebasestorage.app",
    messagingSenderId: "658491753172",
    appId            : "1:658491753172:web:df9bcde25c2598ad6e3141"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  let allRecords  = [];
  let filtered    = [];
  const PAGE_SIZE = 15;
  let currentPage = 1;

  // ── Load data ──
  window.loadData = function() {
    document.getElementById('tableBody').innerHTML =
      '<tr class="loading-row"><td colspan="7"><span class="spinner-inline"></span> Đang tải...</td></tr>';

    onValue(ref(db, 'qr_history'), (snap) => {
      allRecords = [];
      if (snap.exists()) {
        snap.forEach(child => {
          allRecords.push({ id: child.key, ...child.val() });
        });
      }
      updateStats();
      updateBankFilter();
      applyFilter();
      showToast();
    }, { onlyOnce: true });

    // Stats counter
    onValue(ref(db, 'stats/totalQR'), (snap) => {
      document.getElementById('statTotal').textContent =
        snap.exists() ? snap.val().toLocaleString('vi-VN') : '0';
    }, { onlyOnce: true });
  };

  function updateStats() {
    // Tổng số tiền
    const totalAmt = allRecords.reduce((s, r) => s + (r.amount || 0), 0);
    document.getElementById('statAmount').textContent =
      totalAmt > 0 ? totalAmt.toLocaleString('vi-VN') + ' ₫' : '0 ₫';

    // Ngân hàng phổ biến
    const bankCount = {};
    allRecords.forEach(r => {
      const b = r.bank || 'Unknown';
      bankCount[b] = (bankCount[b] || 0) + 1;
    });
    const topBank = Object.entries(bankCount).sort((a,b) => b[1]-a[1])[0];
    document.getElementById('statTopBank').textContent =
      topBank ? `${topBank[0]} (${topBank[1]})` : '—';
  }

  function updateBankFilter() {
    const sel = document.getElementById('bankFilter');
    const banks = [...new Set(allRecords.map(r => r.bank).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">Tất cả ngân hàng</option>';
    banks.forEach(b => {
      const opt = document.createElement('option');
      opt.value = b; opt.textContent = b;
      sel.appendChild(opt);
    });
  }

  window.applyFilter = function() {
    const q      = document.getElementById('searchInput').value.trim().toLowerCase();
    const bank   = document.getElementById('bankFilter').value;
    const sort   = document.getElementById('sortSelect').value;

    filtered = allRecords.filter(r => {
      const matchBank = !bank || r.bank === bank;
      const matchQ    = !q ||
        (r.bank        || '').toLowerCase().includes(q) ||
        (r.accountNo   || '').toLowerCase().includes(q) ||
        (r.accountName || '').toLowerCase().includes(q) ||
        (r.content     || '').toLowerCase().includes(q);
      return matchBank && matchQ;
    });

    filtered.sort((a,b) => {
      if (sort === 'newest')      return (b.timestamp||0) - (a.timestamp||0);
      if (sort === 'oldest')      return (a.timestamp||0) - (b.timestamp||0);
      if (sort === 'amount_desc') return (b.amount||0) - (a.amount||0);
      if (sort === 'amount_asc')  return (a.amount||0) - (b.amount||0);
      return 0;
    });

    currentPage = 1;
    renderTable();
    renderPagination();
  };

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filtered.slice(start, start + PAGE_SIZE);

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="7">
        <div class="empty-state">
          <div class="icon">📭</div>
          Chưa có dữ liệu nào
        </div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = page.map((r, i) => {
      const idx  = start + i + 1;
      const time = r.createdAt
        ? new Date(r.createdAt).toLocaleString('vi-VN', {
            day:'2-digit', month:'2-digit', year:'numeric',
            hour:'2-digit', minute:'2-digit'
          })
        : '—';
      const amt = r.amount > 0
        ? `<span class="amount-text">${r.amount.toLocaleString('vi-VN')} ₫</span>`
        : `<span style="color:#444">—</span>`;

      return `<tr>
        <td style="color:var(--muted);font-size:12px;">${idx}</td>
        <td><span class="bank-badge">${r.bank || '?'}</span></td>
        <td style="font-weight:600;font-family:monospace;letter-spacing:.5px;">${r.accountNo || '—'}</td>
        <td>${r.accountName || '—'}</td>
        <td>${amt}</td>
        <td><span class="content-text" title="${r.content||''}">${r.content || '—'}</span></td>
        <td><span class="time-text">${time}</span></td>
      </tr>`;
    }).join('');
  }

  function renderPagination() {
    const total = Math.ceil(filtered.length / PAGE_SIZE);
    const pg    = document.getElementById('pagination');
    if (total <= 1) { pg.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="goPage(${currentPage-1})"
      ${currentPage===1?'disabled':''}>‹ Trước</button>`;

    for (let i = 1; i <= total; i++) {
      if (i === 1 || i === total || Math.abs(i - currentPage) <= 1) {
        html += `<button class="page-btn ${i===currentPage?'active':''}"
          onclick="goPage(${i})">${i}</button>`;
      } else if (Math.abs(i - currentPage) === 2) {
        html += `<span style="color:var(--muted);padding:0 4px;">…</span>`;
      }
    }

    html += `<button class="page-btn" onclick="goPage(${currentPage+1})"
      ${currentPage===total?'disabled':''}>Sau ›</button>`;
    html += `<span style="font-size:11px;color:var(--muted);margin-left:4px;">
      ${filtered.length} bản ghi</span>`;
    pg.innerHTML = html;
  }

  window.goPage = function(p) {
    const total = Math.ceil(filtered.length / PAGE_SIZE);
    if (p < 1 || p > total) return;
    currentPage = p;
    renderTable();
    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  function showToast() {
    const t = document.getElementById('toast');
    t.style.display = 'flex';
    setTimeout(() => t.style.display = 'none', 2500);
  }

  // Auto load
  window.loadData();
</script>
</body>
</html>
