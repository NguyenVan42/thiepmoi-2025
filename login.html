<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR — Đăng nhập</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #E53E3E;
      --gold:   #D4A017;
      --dark:   #0D0D0D;
      --card:   #161616;
      --border: #2A2A2A;
      --muted:  #6B6B6B;
      --light:  #F0F0F0;
      --white:  #FFFFFF;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: var(--dark);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(229,62,62,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(229,62,62,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(48px); }
    }

    /* Glow orbs */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(229,62,62,.07) 0%, transparent 70%);
      top: -200px; left: -200px;
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }
    @keyframes orbFloat {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(80px, 60px); }
    }

    /* ── CARD ── */
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
      animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Top accent line */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      border-radius: 0 0 4px 4px;
    }

    /* ── LOGO ── */
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .login-logo-icon {
      width: 46px; height: 46px;
      background: var(--red);
      border-radius: 12px;
      display: grid; place-items: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(229,62,62,.4);
    }
    .login-logo-text {
      font-size: 22px; font-weight: 800; letter-spacing: -.5px;
    }
    .login-logo-text span { color: var(--red); }
    .login-logo-sub {
      font-size: 11px; color: var(--muted);
      font-weight: 500; letter-spacing: .3px;
    }

    /* ── HEADING ── */
    .login-title {
      font-size: 24px; font-weight: 800;
      margin-bottom: 6px; letter-spacing: -.3px;
    }
    .login-sub {
      font-size: 13px; color: var(--muted);
      margin-bottom: 32px; line-height: 1.5;
    }

    /* ── FIELDS ── */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 11px; font-weight: 700;
      letter-spacing: .7px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap .icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px; opacity: .4;
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      background: #1A1A1A;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 12px 40px;
      color: var(--white);
      font-family: inherit; font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(229,62,62,.1);
    }
    .input-wrap input::placeholder { color: #333; }

    /* Eye toggle */
    .eye-toggle {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 16px; padding: 2px;
      transition: color .2s;
    }
    .eye-toggle:hover { color: var(--light); }

    /* ── ERROR ── */
    .login-error {
      display: none;
      background: rgba(229,62,62,.08);
      border: 1px solid rgba(229,62,62,.25);
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 12px; color: #fc8181;
      margin-bottom: 16px;
      animation: shake .35s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }

    /* ── BUTTON ── */
    .btn-login {
      width: 100%;
      background: var(--red);
      color: #fff; border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: inherit; font-size: 14px; font-weight: 800;
      cursor: pointer; letter-spacing: .2px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 18px rgba(229,62,62,.3);
      margin-top: 6px;
    }
    .btn-login:hover { opacity: .88; box-shadow: 0 6px 24px rgba(229,62,62,.4); }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

    .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER NOTE ── */
    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px; color: var(--muted);
    }
    .login-footer a { color: var(--gold); text-decoration: none; }

    /* ── SUCCESS flash ── */
    .success-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(13,13,13,.95);
      z-index: 999;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .success-icon {
      width: 72px; height: 72px;
      background: rgba(76,175,80,.15);
      border: 2px solid #4CAF50;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .success-text {
      font-size: 18px; font-weight: 800;
      color: #4CAF50;
    }
    .success-sub {
      font-size: 13px; color: var(--muted);
    }

    @media (max-width: 480px) {
      .login-card { padding: 36px 24px 32px; margin: 16px; }
    }
  </style>
</head>
<body>

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-icon">✓</div>
    <div class="success-text">Đăng nhập thành công!</div>
    <div class="success-sub">Đang chuyển hướng…</div>
  </div>

  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon">🏦</div>
      <div>
        <div class="login-logo-text"><span>QR</span></div>
        <div class="login-logo-sub">Payment Generator</div>
      </div>
    </div>

    <div class="login-title">Xin chào 👋</div>
    <p class="login-sub">Đăng nhập để tiếp tục tạo mã QR thanh toán.</p>

    <!-- Error -->
    <div class="login-error" id="loginError">
      ⚠ Tên đăng nhập hoặc mật khẩu không đúng.
    </div>

    <!-- Username -->
    <div class="field">
      <label>Tên đăng nhập</label>
      <div class="input-wrap">
        <span class="icon">👤</span>
        <input type="text" id="username" placeholder="Nhập tên đăng nhập"
          autocomplete="username" autofocus/>
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <label>Mật khẩu</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Nhập mật khẩu"
          autocomplete="current-password"/>
        <button class="eye-toggle" id="eyeBtn" onclick="toggleEye()" type="button" tabindex="-1">👁</button>
      </div>
    </div>

    <button class="btn-login" id="btnLogin" onclick="doLogin()">
      <div class="btn-spinner" id="btnSpinner"></div>
      <span id="btnText">Đăng nhập</span>
    </button>

    <div class="login-footer">
      Được phát triển bởi <a href="#">Nguyễn Văn</a> &nbsp;·&nbsp;
      Liên hệ: <a href="tel:0337520405">0337 520 405</a>
    </div>

  </div>

  <script src="login.min.js"></script>
</body>
</html>
